<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="http://unpkg.com/tone"></script>
    <script defer src="script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

</head>
<body>
    <div class="gridBox">

        <div class="buttonDiv">

            <button class="buttonGrow" id="playButton">Play sound</button>
            <button class="buttonGrow" id="stopButton">Stop sound</button>

        </div>

        <div class="waveDiv">

            <h3>Sound Waves</h3>

            <select id="selectWave">

                <option value="" disabled selected>Choose a wave</option>
                <option value="sine">Sine wave</option>
                <option value="triangle">Triangle wave</option>
                <option value="square">Square wave</option>
                <option value="sawtooth">Sawtooth wave</option>
            
            </select>

            <label>Frequency
                <input type="number" id="frequencyInput" value="440">
            </label>

            <label>Amplitude
                <input type="number" id="amplitudeInput" value="0.5" step="0.1" min="0" max="1">
            </label>

            <label>Duration
                <input type="number" id="durationInput" value="2.0" step="0.5" min="0.1">
            </label>
        </div>

        <div class="modulationDiv">
            <h3>Modulation</h3>

            <label>
                <input type="radio" name="modulationType" value="none" checked> No Modulation
            </label>
            <label>
                <input type="radio" name="modulationType" value="am"> AM Modulation
            </label>
            <label>
                <input type="radio" name="modulationType" value="fm"> FM Modulation
            </label>

            <div id="modControls">
                
                <label>
                    <input type="checkbox" id="harmonicityToggle">Toggle Harmonicity
                </label>

                <br>

                <label>
                    <input type="number" id="modulationFrequency" value="4" step="0.5" min="0.1">
                </label>

                <label>
                    <select id="selectModulatorWave">
                        <option value="" disabled selected>Choose a modulation wave</option>
                        <option value="sine">Sine wave</option>
                        <option value="triangle">Triangle wave</option>
                        <option value="square">Square wave</option>
                        <option value="sawtooth">Sawtooth wave</option>     
                    </select>
                </label>
                
            </div>

        </div>

        <div class="adsrControls">

            <h3>ADSR Envelope</h3>

            <label>
                <input type="checkbox"id="adsrToggle"> Toggle ADSR
            </label>
            
            <label>Attack
                <input type="number" id="attackInput" value="1">
            </label>

            <label>Decay
                <input type="number" id="decayInput" value="1">
            </label>

            <label>Sustain
                <input type="number" id="sustainInput" value="1">
            </label>
            
            <label>Release
                <input type="number" id="releaseInput" value="1">
            </label>

        </div>

        <div class="filterDiv">

            <h3>Filter</h3>

            <label>
                <input type="radio" name="filterType" value="none" checked> No Filter
            </label>
            <label>
                <input type="radio" name="filterType" value="lowPass"> Low-pass Filter
            </label>
            <label>
                <input type="radio" name="filterType" value="highPass"> High-pass Filter
            </label>

            <label>
                <input type="radio" name="filterType" value="bandPass"> Band-pass Filter
            </label>


        </div>


        <div class="pianoContainer">
            <ul class="pianoKeysList">
                <li class="piano-keys white-key" data-key="01"></li>
                <li class="piano-keys black-key" data-key="02"></li>
                <li class="piano-keys white-key" data-key="03"></li>
                <li class="piano-keys black-key" data-key="04"></li>
                <li class="piano-keys white-key" data-key="05"></li>
                <li class="piano-keys black-key" data-key="06"></li>
                <li class="piano-keys white-key" data-key="07"></li>
                <li class="piano-keys white-key" data-key="08"></li>
                <li class="piano-keys black-key" data-key="09"></li>
                <li class="piano-keys white-key" data-key="10"></li>
                <li class="piano-keys black-key" data-key="11"></li>
                <li class="piano-keys white-key" data-key="12"></li>
                <li class="piano-keys white-key" data-key="13"></li>
                <li class="piano-keys black-key" data-key="14"></li>
                <li class="piano-keys white-key" data-key="15"></li>
                <li class="piano-keys black-key" data-key="16"></li>
                <li class="piano-keys white-key" data-key="17"></li>
                <li class="piano-keys black-key" data-key="18"></li>
                <li class="piano-keys white-key" data-key="19"></li>
                <li class="piano-keys white-key" data-key="20"></li>
                <li class="piano-keys black-key" data-key="21"></li>
                <li class="piano-keys white-key" data-key="22"></li>
                <li class="piano-keys black-key" data-key="23"></li>
                <li class="piano-keys white-key" data-key="24"></li>
            </ul>
        </div>


        

    </div>
</body>
</html>
