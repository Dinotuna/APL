<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script src="http://unpkg.com/tone"></script>
    <script defer src="script.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

</head>
<body>
    <div class="gridBox">

        <div class="buttonDiv">

            <button class="buttonGrow" id="playButton">Play sound</button>
            <button class="buttonGrow" id="stopButton">Stop sound</button>

        </div>

        <div class="waveDiv">

            <h3>Sound Waves</h3>

            <select id="selectWave">

                <option value="" disabled selected>Choose a wave</option>
                <option value="sine">Sine wave</option>
                <option value="triangle">Triangle wave</option>
                <option value="square">Square wave</option>
                <option value="sawtooth">Sawtooth wave</option>
            
            </select>

            <label>Frequency
                <input type="number" id="frequencyInput" value="440">
            </label>

            <label>Amplitude
                <input type="number" id="amplitudeInput" value="0.5" step="0.1" min="0" max="1">
            </label>

            <label>Duration
                <input type="number" id="durationInput" value="2.0" step="0.5" min="0.1">
            </label>
        </div>

        <div class="modulationDiv">
            <h3>Modulation</h3>

            <label>
                <input type="radio" name="modulationType" value="none" checked> No Modulation
            </label>
            <label>
                <input type="radio" name="modulationType" value="am"> AM Modulation
            </label>
            <label>
                <input type="radio" name="modulationType" value="fm"> FM Modulation
            </label>

            <div id="modControls">

                <label>
                    <input type="number" id="modulationFrequency" value="4" step="0.5" min="0.1">
                </label>

                <label>
                    <select id="selectModulatorWave">
                        <option value="" disabled selected>Choose a modulation wave</option>
                        <option value="sine">Sine wave</option>
                        <option value="triangle">Triangle wave</option>
                        <option value="square">Square wave</option>
                        <option value="sawtooth">Sawtooth wave</option>     
                    </select>
                </label>
                
            </div>

        </div>

        <div class="adsrControls">

            <h3>ADSR Envelope</h3>

            
            <label>Attack
                <input type="number" id="attackADSRInput" value="1">
            </label>

            <label>Duration
                <input type="number" id="durationADSRInput" value="1">
            </label>

            <label>Sustain
                <input type="number" id="sustainADSRInput" value="1">
            </label>
            
            <label>Release
                <input type="number" id="releaseADSRInput" value="1">
            </label>

        </div>

    </div>
</body>
</html>
