<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script defer src="script.js"></script>
    <script src="http://unpkg.com/tone"></script>

</head>
<body>

    <head>

        <div class="buttonDiv">

            <button id="playButton">Play sound</button>
            <button id="stopButton">Stop sound</button>

        </div>

        <div class="waveDiv">

            <select id="selectWave">

                <option value="" disabled selected>Choose a wave</option>
                <option value="sine">Sine wave</option>
                <option value="triangle">Triangle wave</option>
                <option value="square">Square wave</option>
                <option value="sawtooth">Sawtooth wave</option>
            
            </select>

            <label>Frequency
                <input type="number" id="frequencyInput" value="440">
            </label>

            <label>Amplitude
                <input type="number" id="amplitudeInput" value="0.5" step="0.1" min="0" max="1">
            </label>

            <label>Duration
                <input type="number" id="durationInput" value="2.0" step="0.5" min="0.1">
            </label>

        </div>

    </head>
    
</body>
</html>
